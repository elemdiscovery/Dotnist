name: Build, Test, and Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGENAME }}
  GITHUB_IMAGE: ghcr.io/${{ github.repository_owner }}/dotnist-grpc

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Disable man-db to make package install and removal faster
      run: |
        echo 'set man-db/auto-update false' | sudo debconf-communicate >/dev/null
        sudo dpkg-reconfigure man-db

    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        tool-cache: false
        android: true
        dotnet: true # we get this in Docker
        haskell: true
        large-packages: false # this is slow apparently
        docker-images: false
        swap-storage: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Run tests in Docker
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: ./Dockerfile
        target: test
        platforms: linux/amd64
        # cacheonly: execute the test RUN steps without exporting an image.
        outputs: type=cacheonly

  build:
    needs: test
    # Never build or push on pull requests; only on push to main and manual dispatch.
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.gitversion.outputs.semVer }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0  # Required for GitVersion to work properly

    - name: Install GitVersion # Putting this before disk space cleanup since it apparently uses dotnet.
      uses: gittools/actions/gitversion/setup@7417b1089e2c7de93510f1901d656ddf60bb024f # v4.7.0
      with:
        versionSpec: '6.7.x'

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@7417b1089e2c7de93510f1901d656ddf60bb024f # v4.7.0
      with:
        configFilePath: GitVersion.yml
        
    - name: Disable man-db to make package install and removal faster
      run: |
        echo 'set man-db/auto-update false' | sudo debconf-communicate >/dev/null
        sudo dpkg-reconfigure man-db
        
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        # this might remove tools that are actually needed,
        # if set to "true" but frees about 6 GB
        tool-cache: false
        
        # all of these default to true, but feel free to set to
        # "false" if necessary for your workflow
        android: true
        dotnet: true # we get this in Docker
        haskell: true
        large-packages: false # this is slow apparently
        docker-images: false
        swap-storage: true # this will cause issues if we use a lot of memory
      
    - name: Prepare
      run: |
        platform=${{ matrix.platform }}
        echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      
    - name: Log into Docker Hub
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
      
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and push by digest
      id: build
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: ./Dockerfile
        platforms: ${{ matrix.platform }}
        tags: |
          ${{ env.DOCKERHUB_IMAGE }}
          ${{ env.GITHUB_IMAGE }}
        build-args: |
          VERSION=${{ steps.gitversion.outputs.semVer }}
          ASSEMBLY_VERSION=${{ steps.gitversion.outputs.assemblySemVer }}
          FILE_VERSION=${{ steps.gitversion.outputs.assemblySemFileVer }}
          INFORMATIONAL_VERSION=${{ steps.gitversion.outputs.informationalVersion }}
        outputs: type=image,push-by-digest=true,name-canonical=true,push=true

    - name: Export digest
      run: |
        mkdir -p ${{ runner.temp }}/digests
        digest="${{ steps.build.outputs.digest }}"
        touch "${{ runner.temp }}/digests/${digest#sha256:}"

    - name: Upload digest
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: digests-${{ env.PLATFORM_PAIR }}
        path: ${{ runner.temp }}/digests/*
        if-no-files-found: error
        retention-days: 1

  merge:
    runs-on: ubuntu-24.04
    needs:
      - build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Download digests
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: ${{ runner.temp }}/digests
        pattern: digests-*
        merge-multiple: true

    - name: Log into Docker Hub
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Create manifest list and push
      working-directory: ${{ runner.temp }}/digests
      run: |
        # Create manifest for latest tag on both registries
        docker buildx imagetools create -t ${{ env.DOCKERHUB_IMAGE }}:latest \
          $(printf '${{ env.DOCKERHUB_IMAGE }}@sha256:%s ' *)
        docker buildx imagetools create -t ${{ env.GITHUB_IMAGE }}:latest \
          $(printf '${{ env.GITHUB_IMAGE }}@sha256:%s ' *)
        
        # Create manifest for version tag on both registries
        docker buildx imagetools create -t ${{ env.DOCKERHUB_IMAGE }}:${{ needs.build.outputs.version }} \
          $(printf '${{ env.DOCKERHUB_IMAGE }}@sha256:%s ' *)
        docker buildx imagetools create -t ${{ env.GITHUB_IMAGE }}:${{ needs.build.outputs.version }} \
          $(printf '${{ env.GITHUB_IMAGE }}@sha256:%s ' *)

    - name: Inspect images
      run: |
        echo "Inspecting Docker Hub image:"
        docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:latest
        echo "Inspecting GitHub Container Registry image:"
        docker buildx imagetools inspect ${{ env.GITHUB_IMAGE }}:latest

  # ---- NuGet packages (Dotnist, Dotnist.Client) ----
  # Gated by the same `test` job as the container image. Like the image build,
  # packing/publishing is skipped on pull requests; PRs only run `test`.
  pack-nuget:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Required for GitVersion to work properly

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@7417b1089e2c7de93510f1901d656ddf60bb024f # v4.7.0
        with:
          versionSpec: "6.7.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@7417b1089e2c7de93510f1901d656ddf60bb024f # v4.7.0
        with:
          configFilePath: GitVersion.yml

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build projects
        run: dotnet build --no-restore --configuration Release

      - name: Pack Dotnist.Client
        run: |
          dotnet pack Dotnist.Client/Dotnist.Client.csproj \
            --no-build \
            --configuration Release \
            --output ./nupkgs \
            -p:Version=${{ steps.gitversion.outputs.semVer }} \
            -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
            -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} \
            -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}

      - name: Pack Dotnist
        run: |
          dotnet pack Dotnist/Dotnist.csproj \
            --no-build \
            --configuration Release \
            --output ./nupkgs \
            -p:Version=${{ steps.gitversion.outputs.semVer }} \
            -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
            -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} \
            -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}

      - name: List generated packages
        run: ls -la ./nupkgs/

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-packages
          path: ./nupkgs/*.nupkg
          retention-days: 1

  publish-github:
    needs: pack-nuget
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-packages
          path: ./nupkgs

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
            --skip-duplicate

  publish-nuget:
    needs: pack-nuget
    runs-on: ubuntu-latest
    if: vars.NUGET_USERNAME != ''
    permissions:
      # Required to mint the OIDC token that NuGet.org trusted publishing exchanges
      # for a short-lived API key.
      id-token: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-packages
          path: ./nupkgs

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "9.0.x"

      - name: NuGet login (trusted publishing)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          # Must be the nuget.org username of the person who CREATED the
          # trusted publishing policy, not the org that owns the packages.
          user: ${{ vars.NUGET_USERNAME }}

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # Tag the released commit and create a GitHub Release with generated notes
  # and the .nupkg files attached. Runs only if nothing upstream failed;
  # tolerates publish-nuget being skipped (NUGET_ORG not configured).
  release:
    needs: [build, merge, publish-github, publish-nuget]
    if: ${{ !failure() && !cancelled() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      # No checkout in this job, so tell gh which repo to operate on.
      GH_REPO: ${{ github.repository }}
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-packages
          path: ./nupkgs

      - name: Create GitHub release
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists; skipping."
            exit 0
          fi
          gh release create "v${VERSION}" ./nupkgs/*.nupkg \
            --target "${GITHUB_SHA}" \
            --title "v${VERSION}" \
            --generate-notes