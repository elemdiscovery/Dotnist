version: 2
updates:
  # Bumps the pinned action SHAs and keeps the trailing version comments in sync.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    groups:
      nuget-minor-patch:
        update-types:
          - minor
          - patch

  # Base images in the Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
